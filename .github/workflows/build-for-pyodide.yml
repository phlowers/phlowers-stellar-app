name: Build and Upload Wheel For pyodide

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install uv and Set up Python
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.24"
          python-version: "3.12"

      - name: ⚙️ Install dependencies
        run: |
          uv sync --group all

      - name: 🛠️ Build wheel
        run: |
          uv build

      - name: Build wheels
        run: |
          pip wheel -w dist -r requirements.txt

      # - name: Upload wheel files
